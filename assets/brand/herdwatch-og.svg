      <stop offset="0" stop-color="#292c30"/>
      <stop offset="1" stop-color="#15171a"/>
    </radialGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9eb25"/>
      <stop offset="1" stop-color="#b9d20d"/>
    </linearGradient>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <g id="sheep">
