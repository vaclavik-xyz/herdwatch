  <path d="M0 500c149 4 237-63 375-43 121 17 170 87 306 71 159-19 320-120 519-60v162H0z" fill="#202327"/>
  <path d="M0 551c180-42 323-38 462 18 125 51 244 53 379 11 135-43 239-47 359-24v74H0z" fill="#181a1d"/>

